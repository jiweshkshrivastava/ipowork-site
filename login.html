<!DOCTYPE html>
<html>
<head>
  <title>Login | IPOWORK</title>
  <style>
    body {
      font-family: Arial;
      background: #0B0F1A;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #111827;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #1D9BF0;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>IPOwork</h2>
  <p>IPO Readiness Platform</p>

  <input type="text" id="phone" placeholder="Enter Phone Number">
  <button onclick="sendOtp()">Send OTP</button>

  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOtp()">Verify & Login</button>

  <p style="font-size:12px; opacity:0.7;">🔒 Secure Login</p>
</div>

<script>
async function sendOtp() {
  const phone = document.getElementById("phone").value;

  await fetch('https://esqlfsjhekdspsycfgnz.supabase.co/functions/v1/send-otp', {
    method: 'POST',
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ phone: "91" + phone })
  });

  alert("OTP Sent ✅");
}

async function verifyOtp() {
  const phone = document.getElementById("phone").value;
  const otp = document.getElementById("otp").value;

  const res = await fetch('https://esqlfsjhekdspsycfgnz.supabase.co/functions/v1/verify-otp', {
    method: 'POST',
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      phone: "91" + phone,
      otp: otp
    })
  });

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", JSON.stringify({
      phone: "91" + phone,
      loggedIn: true
    }));

    window.location.href = "/dashboard.html";

  } else {
    alert("Invalid OTP ❌");
  }
}
</script>

</body>
</html>
