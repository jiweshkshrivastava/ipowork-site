<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AIDA Document Review — ipowork</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAFAF8;--tl:#0D5C6B;--tld:#08404D;--tll:#1A7D90;--sf:#E88A2E;--go:#C9932A;--sl:#2C3E47;--mu:#6B7E85;--bd:#E2E8EA;--ok:#1A9E6B;--er:#C0392B;--sh:0 1px 4px rgba(13,92,107,.06),0 4px 16px rgba(13,92,107,.04);--sh2:0 4px 20px rgba(13,92,107,.1),0 12px 40px rgba(13,92,107,.07);--r:12px;--r2:16px;--font:'Sora',sans-serif;--serif:'Fraunces',Georgia,serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--sl);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
.topbar{background:#fff;border-bottom:1px solid var(--bd);height:54px;display:flex;align-items:center;padding:0 24px;gap:10px;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.logo{font-family:var(--serif);font-size:18px;font-weight:900;color:var(--tld)}
.logo span{color:var(--sf)}
.portal-lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;padding-left:10px;border-left:1px solid var(--bd)}
.spacer{flex:1}
.tb-link{font-size:13px;font-weight:700;color:var(--tl);padding:6px 14px;border:1px solid var(--bd);border-radius:7px;transition:.15s}
.tb-link:hover{background:rgba(13,92,107,.06);border-color:var(--tl)}
.page{max-width:720px;margin:0 auto;padding:32px 24px 60px}
@media(max-width:600px){.page{padding:20px 14px 40px}}
.pg-ey{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tll);margin-bottom:6px}
.pg-title{font-family:var(--serif);font-size:26px;font-weight:900;color:var(--tld);margin-bottom:7px}
.pg-desc{font-size:14px;color:var(--mu);line-height:1.75;margin-bottom:24px;max-width:540px}
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r2);padding:22px 24px;box-shadow:var(--sh);margin-bottom:16px}
.flbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);margin-bottom:5px}
.inp{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;font-family:var(--font);font-size:14px;color:var(--sl);outline:none;transition:.15s;-webkit-appearance:none}
.inp:focus{border-color:var(--tl);box-shadow:0 0 0 3px rgba(13,92,107,.1);background:#fff}
.inp::placeholder{color:rgba(13,92,107,.3)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:500px){.fg{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
@media(max-width:500px){.chk-grid{grid-template-columns:1fr}}
.chk-lbl{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;cursor:pointer;font-size:13px;color:var(--sl);transition:.15s}
.chk-lbl:hover{border-color:var(--tl);background:rgba(13,92,107,.03)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:9px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s;width:100%}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-teal{background:var(--tl);color:#fff;box-shadow:0 2px 8px rgba(13,92,107,.22)}
.btn-teal:hover{background:var(--tld)}
.btn-sf{background:var(--sf);color:#fff}
.btn-sf:hover{background:var(--go)}
.btn-ghost{background:#fff;border:1px solid var(--bd);color:var(--mu);padding:9px 18px;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;width:auto;display:inline-flex}
.btn-ghost:hover{border-color:var(--tl);color:var(--tl)}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.result{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh);margin-bottom:12px;white-space:pre-wrap;font-size:14px;color:var(--sl);line-height:1.8;font-family:var(--font)}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bd)}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:#25D366;color:#fff;border-radius:10px;font-weight:800;font-size:14px;text-decoration:none;margin-top:10px}
.wa-btn:hover{background:#128C7E}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="logo">ipo<span>work</span></a>
  <div class="portal-lbl">AIDA Document Review</div>
  <div class="spacer"></div>
  <a href="issuer.html" class="tb-link">← Issuer Portal</a>
</div>

<div class="page">
  <div class="pg-ey">AI DOCUMENT TOOLS</div>
  <h1 class="pg-title">📄 AIDA Document Review</h1>
  <p class="pg-desc">Paste document text. AI flags SEBI ICDR gaps, missing disclosures and compliance risks before your DRHP filing.</p>
  <div id="form-section" class="card">
    <div class="field" style="margin-bottom:14px">
      <label class="flbl">Document Type</label>
      <select class="inp" id="a-type">
        <option>Annual Report / Financial Statements</option>
        <option>Board Resolution</option>
        <option>MOA / AOA</option>
        <option>Shareholder Agreement</option>
        <option>Auditor Report</option>
        <option>GST / Tax Filing</option>
        <option>ROC Filing (AOC-4 / MGT-7)</option>
        <option>Any IPO Document</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:16px">
      <label class="flbl">Paste Document Text *</label>
      <textarea class="inp" id="a-text" rows="10" placeholder="Paste the document text here. AIDA will flag SEBI ICDR gaps, missing disclosures and compliance risks..." style="resize:vertical;line-height:1.6"></textarea>
    </div>
    <button class="btn btn-teal" id="a-btn" onclick="runAIDA()">📄 Review Document →</button>
  </div>
  <div id="result-section" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <div class="sec" style="flex:1">AIDA Review Report</div>
      <button class="btn-ghost" onclick="reset()">↺ Review Another</button>
    </div>
    <div class="result" id="result-text"></div>
    <a href="https://wa.me/918851059588?text=Hi%20ipowork%2C%20AIDA%20found%20issues%20in%20my%20document.%20Need%20expert%20help." target="_blank" class="wa-btn">📱 Get Expert Help →</a>
  </div>
</div>

<script>
var WORKER = 'https://flat-bread-b021.jiweshkshrivastava.workers.dev/';

async function runAIDA(){
  var text=document.getElementById('a-text').value.trim();
  var dtype=document.getElementById('a-type').value;
  if(!text){alert('Please paste document text.');return;}
  var btn=document.getElementById('a-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Reviewing…';
  try{
    var r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,
        system:'You are AIDA — AI IPO Document Analyzer for India. Review documents and flag: RED FLAGS (critical issues with regulation refs), MISSING DISCLOSURES (mandatory items not found), COMPLIANCE ISSUES (SEBI ICDR 2018 / Companies Act 2013), RECOMMENDATIONS (specific fixes with timelines). Be precise.',
        messages:[{role:'user',content:'Document Type: '+dtype+'\n\nDocument:\n'+text.substring(0,4000)}]})});
    var d=await r.json();
    document.getElementById('result-text').textContent=(d.content||[]).map(function(c){return c.text||'';}).join('');
    document.getElementById('form-section').style.display='none';
    document.getElementById('result-section').style.display='block';
  }catch(e){
    btn.disabled=false;btn.innerHTML='📄 Review Document →';
    alert('Review failed. Please try again.');
  }
}
function reset(){
  document.getElementById('form-section').style.display='block';
  document.getElementById('result-section').style.display='none';
  document.getElementById('a-btn').disabled=false;
  document.getElementById('a-btn').innerHTML='📄 Review Document →';
}

</script>
</body>
</html>
