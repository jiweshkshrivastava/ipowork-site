<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Issuer Portal — ipowork</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --bg:#FAFAF8;--surface:#fff;--card2:#F7F3EE;
  --tl:#0D5C6B;--tld:#08404D;--tll:#1A7D90;
  --sf:#E88A2E;--go:#C9932A;
  --sl:#2C3E47;--mu:#6B7E85;--bd:#E2E8EA;
  --ok:#1A9E6B;--er:#C0392B;--wn:#D4860C;
  --sh:0 1px 4px rgba(13,92,107,.06),0 4px 16px rgba(13,92,107,.04);
  --sh2:0 4px 20px rgba(13,92,107,.1),0 12px 40px rgba(13,92,107,.07);
  --r:12px;--r2:16px;
  --font:'Sora',sans-serif;--serif:'Fraunces',Georgia,serif;--mono:'JetBrains Mono',monospace;
  /* aliases for legacy scripts */
  --text:var(--sl);--muted:var(--mu);--border:var(--bd);--border2:rgba(13,92,107,.06);
  --surface2:var(--card2);--amber:var(--sf);--amber2:var(--go);--green:var(--ok);
  --dim:rgba(13,92,107,.35);--red:var(--er);
}
body{font-family:var(--font);background:var(--bg);color:var(--sl);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh}

/* ── TOPBAR ── */
.topbar{height:54px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;box-shadow:var(--sh);z-index:50}
.tb-logo{font-family:var(--serif);font-size:18px;font-weight:900;color:var(--tld);text-decoration:none;letter-spacing:-.3px;flex-shrink:0}
.tb-logo span{color:var(--sf)}
.tb-portal{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.8px;padding-left:10px;margin-left:2px;border-left:1px solid var(--bd)}
.tb-spacer{flex:1}
.tb-user{font-size:13px;font-weight:600;color:var(--sl);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-btn{font-size:13px;font-weight:700;color:var(--tl);padding:6px 14px;border:1px solid var(--bd);border-radius:7px;text-decoration:none;white-space:nowrap;transition:.15s;cursor:pointer;background:#fff;font-family:var(--font)}
.tb-btn:hover{border-color:var(--tl);background:rgba(13,92,107,.04)}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:240px;flex-shrink:0;background:var(--tld);display:flex;flex-direction:column;overflow:hidden}
.sb-brand{padding:16px 18px 13px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-brand-name{font-family:var(--serif);font-size:17px;font-weight:900;color:#fff;letter-spacing:-.3px}
.sb-brand-name span{color:var(--sf)}
.sb-brand-tag{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0 12px}
.sb-sec{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px;padding:10px 16px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);transition:.15s;text-decoration:none;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:var(--font)}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(232,138,46,.18);color:#E88A2E;font-weight:700}
.nav-item .ni{font-size:15px;flex-shrink:0}
.nav-item .nl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.nb-free{background:rgba(26,158,107,.2);color:#6DDC9E}
.nb-shared{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.nb-pro{background:rgba(232,138,46,.25);color:#E88A2E}
.nb-num{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-user-plan{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.portal-pad{padding:24px 28px;max-width:860px}
@media(max-width:640px){.portal-pad{padding:16px 14px}}

/* ── PAGE TITLES ── */
.page-ey{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tll);margin-bottom:5px}
.page-title{font-family:var(--serif);font-size:24px;font-weight:900;color:var(--tld);margin-bottom:6px}
.page-sub{font-size:14px;color:var(--mu);line-height:1.75;margin-bottom:20px;max-width:560px}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh)}
.card2{background:#fff;border:1px solid var(--bd);border-radius:var(--r2);padding:20px 22px;box-shadow:var(--sh)}
.sec-hd{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-hd::after{content:'';flex:1;height:1px;background:rgba(13,92,107,.06)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;border-radius:9px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-teal{background:var(--tl);color:#fff;box-shadow:0 2px 8px rgba(13,92,107,.22)}
.btn-teal:hover{background:var(--tld)}
.btn-sf{background:var(--sf);color:#fff;box-shadow:0 2px 8px rgba(232,138,46,.25)}
.btn-sf:hover{background:var(--go)}
.btn-ghost{background:#fff;border:1px solid var(--bd);color:var(--mu);padding:9px 16px;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-ghost:hover{border-color:var(--tl);color:var(--tl)}
.btn-sm{padding:7px 14px;font-size:13px}

/* ── INPUTS ── */
.inp{background:var(--card2);border:1px solid var(--bd);border-radius:9px;padding:9px 13px;font-family:var(--font);font-size:14px;color:var(--sl);outline:none;transition:.15s;width:100%;-webkit-appearance:none}
.inp:focus{border-color:var(--tl);box-shadow:0 0 0 3px rgba(13,92,107,.1);background:#fff}
.inp::placeholder{color:rgba(13,92,107,.3)}
label.lbl{display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}

/* ── FORM GRID ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg.fg1{grid-template-columns:1fr}
.fg.fg3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:600px){.fg,.fg3{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}

/* ── SPINNER ── */
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STEP CARDS ── */
.step-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r2);padding:18px 20px;text-decoration:none;display:block;transition:.18s;border-left:3px solid}
.step-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.grid2,.grid4{grid-template-columns:1fr 1fr}}

/* ── AI CHAT ── */
.ai-msgs{display:flex;flex-direction:column;gap:10px;padding:0 0 16px}
.msg-wrap{display:flex;gap:10px;align-items:flex-start}
.msg-wrap.user{flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px}
.msg-av.ai{background:var(--tld);color:#fff}
.msg-av.user{background:var(--sf);color:#fff}
.msg-body{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:10px 14px;max-width:85%;font-size:14px;line-height:1.65;color:var(--sl);box-shadow:var(--sh);white-space:pre-wrap}
.msg-wrap.user .msg-body{background:var(--tld);color:#fff;border-color:var(--tld)}
.ai-input-row{display:flex;gap:8px;padding:12px 0 0;border-top:1px solid var(--bd);position:sticky;bottom:0;background:var(--bg)}
.ai-input-row textarea{flex:1;background:#fff;border:1px solid var(--bd);border-radius:9px;padding:10px 13px;font-family:var(--font);font-size:14px;color:var(--sl);resize:none;outline:none;min-height:42px;max-height:120px;transition:.15s}
.ai-input-row textarea:focus{border-color:var(--tl);box-shadow:0 0 0 3px rgba(13,92,107,.1)}
.ai-cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.ai-cat-btn{padding:6px 14px;background:#fff;border:1px solid var(--bd);border-radius:99px;font-size:12px;font-weight:600;color:var(--mu);cursor:pointer;transition:.15s}
.ai-cat-btn.active,.ai-cat-btn:hover{background:var(--tl);color:#fff;border-color:var(--tl)}
.ai-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:600px){.ai-grid{grid-template-columns:1fr}}
.ai-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:.15s;display:flex;align-items:flex-start;gap:12px}
.ai-card:hover{border-color:var(--tl);box-shadow:var(--sh2);transform:translateY(-1px)}
.ai-card-icon{font-size:22px;flex-shrink:0}
.ai-card-name{font-size:14px;font-weight:700;color:var(--tld);margin-bottom:3px}
.ai-card-tag{font-size:12px;color:var(--mu);line-height:1.5}
.ai-free-badge{font-size:10px;font-weight:700;color:var(--ok);background:rgba(26,158,107,.08);border-radius:4px;padding:2px 6px;border:1px solid rgba(26,158,107,.18);margin-top:5px;display:inline-block}

/* ── RESULT CARD ── */
.result-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);margin-bottom:12px}
.result-card pre{font-size:13px;color:var(--sl);line-height:1.8;white-space:pre-wrap;font-family:var(--font)}

/* ── ERR / SUCCESS ── */
.err{color:var(--er);font-size:13px;padding:9px 13px;background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.18);border-radius:8px;margin-top:8px;display:none}
.err.show{display:block}
.succ{color:var(--ok);font-size:13px;padding:9px 13px;background:rgba(26,158,107,.06);border:1px solid rgba(26,158,107,.2);border-radius:8px;margin-top:8px}

/* ── KV STATS ── */
.kv-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:14px;box-shadow:var(--sh);text-align:center}
.kv-val{font-family:var(--serif);font-size:22px;font-weight:900;color:var(--tl)}
.kv-lbl{font-size:11px;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}

/* ── CHECKLIST & CRM shims (for legacy renderIssuerChecklist / renderCRMIssuer) ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mu);padding:9px 14px;border-bottom:2px solid var(--bd);text-align:left;background:var(--card2)}
.tbl td{padding:9px 14px;border-bottom:1px solid rgba(13,92,107,.04);font-size:13px;color:var(--sl);vertical-align:top}
.tbl tr:hover td{background:var(--card2)}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.badge-ok{background:rgba(26,158,107,.1);color:var(--ok)}
.badge-wn{background:rgba(212,134,12,.1);color:var(--wn)}
.badge-er{background:rgba(192,57,43,.1);color:var(--er)}
.badge-mu{background:rgba(107,126,133,.1);color:var(--mu)}
/* legacy classes used in old render fns */
.page-title{font-family:var(--serif);font-size:22px;font-weight:900;color:var(--tld);margin-bottom:6px}
.page-sub{font-size:14px;color:var(--mu);line-height:1.75;margin-bottom:20px;max-width:560px}
.btn-gold{background:var(--sf);color:#fff;box-shadow:0 2px 8px rgba(232,138,46,.25)}
.btn-gold:hover{background:var(--go)}
.btn-outline{background:#fff;border:1.5px solid var(--bd);color:var(--tl)}
.btn-outline:hover{border-color:var(--tl);background:rgba(13,92,107,.04)}
.btn-sm{padding:7px 14px;font-size:13px}
.kanban-col{background:var(--card2);border-radius:var(--r);padding:12px;min-width:200px}
.kanban-card{background:#fff;border:1px solid var(--bd);border-radius:9px;padding:12px;margin-bottom:8px;cursor:pointer;font-size:13px;box-shadow:var(--sh)}
.inp{background:var(--card2);border:1px solid var(--bd);border-radius:9px;padding:9px 13px;font-family:var(--font);font-size:14px;color:var(--sl);outline:none;transition:.15s;-webkit-appearance:none}
.inp:focus{border-color:var(--tl);box-shadow:0 0 0 3px rgba(13,92,107,.1);background:#fff}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="index.html" class="tb-logo">ipo<span>work</span></a>
    <div class="tb-portal">Issuer Portal</div>
    <div class="tb-spacer"></div>
    <div class="tb-user" id="tb-user-name"></div>
    <button class="tb-btn" id="tb-auth-btn" onclick="handleAuthBtn()">🔑 Sign In</button>
  </div>

  <div class="body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sb-brand">
        <div class="sb-brand-name">ipo<span>work</span></div>
        <div class="sb-brand-tag">Issuer Portal</div>
      </div>
      <div class="sb-nav" id="sb-nav">
        <!-- rendered by renderNav() -->
      </div>
      <div class="sb-foot" id="sb-foot">
        <div class="sb-user-name" id="sb-user-name">Not signed in</div>
        <div class="sb-user-plan">Free Plan</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main-content">
      <!-- rendered by renderView() -->
    </div>
  </div>

</div>

<script>

/* ═══════════════════════════════════════════════════════════════
   SUPABASE CLOUD STORAGE — replaces window.storage
   
   Setup (5 min):
   1. Go to supabase.com → New project (free)
   2. Run the SQL below in SQL Editor
   3. Get Project URL + anon key from Settings → API
   4. Replace SUPABASE_URL and SUPABASE_ANON_KEY below
   
   SQL to run in Supabase SQL Editor:
   ─────────────────────────────────
   create table if not exists user_data (
     id bigserial primary key,
     email text not null,
     portal text not null,
     key text not null,
     value text,
     updated_at timestamptz default now(),
     unique(email, portal, key)
   );
   
   create table if not exists shared_data (
     id bigserial primary key,
     key text not null unique,
     value text,
     updated_at timestamptz default now()
   );
   
   alter table user_data enable row level security;
   alter table shared_data enable row level security;
   
   create policy "Anyone can read/write user_data"
     on user_data for all using (true) with check (true);
   
   create policy "Anyone can read/write shared_data"
     on shared_data for all using (true) with check (true);
   ─────────────────────────────────
═══════════════════════════════════════════════════════════════ */

(function(){
  var SUPABASE_URL  = 'https://esqlfsjhekdspycfgnoz.supabase.co';    /* e.g. https://abcxyz.supabase.co */
  var SUPABASE_KEY  = 'sb_publishable_CFdw2j0-mD4VeF9kQdyhdg_ZDPxQW9a';
  var PORTAL        = document.title.split('|')[1]?.trim() || window.location.pathname.replace(/\//g,'').replace('.html','') || 'unknown';

  function sbHeaders(){
    return {
      'Content-Type':  'application/json',
      'apikey':        SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer':        'return=representation'
    };
  }

  function getUserEmail(){
    /* SESS is the session object defined in each portal */
    return (typeof SESS !== 'undefined' && SESS.email) ? SESS.email : 'anon@ipowork.com';
  }

  /* ── GET ── */
  async function sbGet(key, shared){
    try {
      if(shared){
        var url = SUPABASE_URL + '/rest/v1/shared_data?key=eq.' + encodeURIComponent(key) + '&select=value&limit=1';
        var r = await fetch(url, { headers: sbHeaders() });
        var d = await r.json();
        if(!d || !d.length || d[0].value === undefined) throw new Error('Key not found: ' + key);
        return { key: key, value: d[0].value, shared: true };
      } else {
        var email = getUserEmail();
        var url = SUPABASE_URL + '/rest/v1/user_data?email=eq.' + encodeURIComponent(email) +
                  '&portal=eq.' + encodeURIComponent(PORTAL) +
                  '&key=eq.' + encodeURIComponent(key) + '&select=value&limit=1';
        var r = await fetch(url, { headers: sbHeaders() });
        var d = await r.json();
        if(!d || !d.length || d[0].value === undefined) throw new Error('Key not found: ' + key);
        return { key: key, value: d[0].value, shared: false };
      }
    } catch(e){ throw e; }
  }

  /* ── SET ── */
  async function sbSet(key, value, shared){
    try {
      if(shared){
        var url = SUPABASE_URL + '/rest/v1/shared_data';
        var body = JSON.stringify({ key: key, value: value, updated_at: new Date().toISOString() });
        /* upsert */
        var r = await fetch(url, {
          method: 'POST',
          headers: Object.assign({}, sbHeaders(), { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
          body: body
        });
        if(!r.ok){ var t = await r.text(); throw new Error('Supabase set failed: ' + t.slice(0,100)); }
        return { key: key, value: value, shared: true };
      } else {
        var email = getUserEmail();
        var url = SUPABASE_URL + '/rest/v1/user_data';
        var body = JSON.stringify({ email: email, portal: PORTAL, key: key, value: value, updated_at: new Date().toISOString() });
        var r = await fetch(url, {
          method: 'POST',
          headers: Object.assign({}, sbHeaders(), { 'Prefer': 'resolution=merge-duplicates,return=representation' }),
          body: body
        });
        if(!r.ok){ var t = await r.text(); throw new Error('Supabase set failed: ' + t.slice(0,100)); }
        return { key: key, value: value, shared: false };
      }
    } catch(e){ throw e; }
  }

  /* ── DELETE ── */
  async function sbDelete(key, shared){
    try {
      if(shared){
        var url = SUPABASE_URL + '/rest/v1/shared_data?key=eq.' + encodeURIComponent(key);
        await fetch(url, { method: 'DELETE', headers: sbHeaders() });
      } else {
        var email = getUserEmail();
        var url = SUPABASE_URL + '/rest/v1/user_data?email=eq.' + encodeURIComponent(email) +
                  '&portal=eq.' + encodeURIComponent(PORTAL) +
                  '&key=eq.' + encodeURIComponent(key);
        await fetch(url, { method: 'DELETE', headers: sbHeaders() });
      }
      return { key: key, deleted: true, shared: shared };
    } catch(e){ throw e; }
  }

  /* ── LIST ── */
  async function sbList(prefix, shared){
    try {
      if(shared){
        var url = SUPABASE_URL + '/rest/v1/shared_data?key=like.' + encodeURIComponent((prefix||'') + '*') + '&select=key';
        var r = await fetch(url, { headers: sbHeaders() });
        var d = await r.json();
        return { keys: (d||[]).map(function(x){ return x.key; }), prefix: prefix, shared: true };
      } else {
        var email = getUserEmail();
        var url = SUPABASE_URL + '/rest/v1/user_data?email=eq.' + encodeURIComponent(email) +
                  '&portal=eq.' + encodeURIComponent(PORTAL) +
                  '&key=like.' + encodeURIComponent((prefix||'') + '*') + '&select=key';
        var r = await fetch(url, { headers: sbHeaders() });
        var d = await r.json();
        return { keys: (d||[]).map(function(x){ return x.key; }), prefix: prefix, shared: false };
      }
    } catch(e){ throw e; }
  }

  /* ── Fallback to localStorage if Supabase not configured ── */
  var configured = SUPABASE_URL.indexOf('REPLACE') === -1 && SUPABASE_KEY.indexOf('REPLACE') === -1;

  if(configured){
    window.storage = { get: sbGet, set: sbSet, delete: sbDelete, list: sbList };
    console.log('[ipowork] Cloud storage: Supabase ✅');
  } else {
    /* localStorage fallback — works but not cross-device */
    window.storage = {
      _k: function(k,s){ return (s?'sh_':'pr_') + k; },

async function runGapAnalysis(){

  var btn = document.getElementById('gap-btn');

  try {

        system:'You are an IPO compliance expert for India. Analyze compliance gaps for a company preparing for IPO. Be specific with SEBI ICDR 2018, Companies Act 2013 regulation numbers. Format: CRITICAL GAPS (numbered), HIGH PRIORITY GAPS (numbered), RECOMMENDED FIXES (numbered), ESTIMATED TIMELINE.',

  } catch(e){ gapResult = { company:cin, sector:sector, report:'Analysis unavailable. Please check Worker configuration.' }; }
  renderView();
}
